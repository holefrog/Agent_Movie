<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Movie - 正在扫描媒体库</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .scan-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.5rem;
      color: var(--text-color);
    }

    .scan-icon {
      font-size: 3rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .scan-title {
      margin: 0;
      font-size: 1.4rem;
      color: #334155;
    }

    .scan-subtitle {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
    }

    /* 进度条 */
    .progress-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary-color, #6366f1);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    /* 当前处理的电影名 */
    .current-movie {
      max-width: 480px;
      width: 100%;
      text-align: center;
      font-size: 0.88rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 1.4em;
    }

    .spinner-small {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--primary-color, #6366f1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      max-width: 480px;
      width: 100%;
      padding: 1rem 1.25rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎬 中文字幕获取</h1>
    <div class="scan-container">
      <div class="scan-icon">🔍</div>
      <h2 class="scan-title" id="scan-title">正在扫描媒体库...</h2>
      <p class="scan-subtitle" id="scan-subtitle">正在读取影片元数据和字幕状态</p>

      <!-- Stage 1 进度 -->
      <div class="progress-wrap" id="progress-wrap" style="display:none">
        <div style="font-size:0.82rem; color:#475569; margin-bottom:0.4rem; font-weight:600;">
          Stage 1 &middot; 媒体库扫描
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label">
          <span id="progress-text">0 / 0</span>
          <span id="progress-pct">0%</span>
        </div>
      </div>

      <!-- Stage 2 进度（与 Stage 1 同步，同一循环完成） -->
      <div class="progress-wrap" id="progress-wrap-2" style="display:none; margin-top:1rem">
        <div style="font-size:0.82rem; color:#475569; margin-bottom:0.4rem; font-weight:600;">
          Stage 2 &middot; 字幕评估
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill-2" style="background: #8b5cf6;"></div>
        </div>
        <div class="progress-label">
          <span id="progress-text-2">0 / 0</span>
          <span id="progress-pct-2">0%</span>
        </div>
      </div>

      <div class="current-movie" id="current-movie"></div>

      <div class="error-box" id="error-box" style="display:none"></div>
    </div>
  </div>

  <script>
    let pollTimer = null;

    function updateProgress(data) {
      const total = data.total || 0;
      const current = data.current || 0;
      const pct = total > 0 ? Math.min(100, Math.round(current / total * 100)) : 0;
      const movieName = data.current_movie || '';

      // 显示进度条（总数已知时）
      if (total > 0) {
        // Stage 1 进度条
        document.getElementById('progress-wrap').style.display = '';
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = current + ' / ' + total;
        document.getElementById('progress-pct').textContent = pct + '%';
        // Stage 2 进度条（同步推进）
        document.getElementById('progress-wrap-2').style.display = '';
        document.getElementById('progress-fill-2').style.width = pct + '%';
        document.getElementById('progress-text-2').textContent = current + ' / ' + total;
        document.getElementById('progress-pct-2').textContent = pct + '%';

        document.getElementById('scan-title').textContent = '正在扫描媒体库...';
        document.getElementById('scan-subtitle').textContent = `共 ${total} 部影片，Stage 1 & 2 在同一循环中完成`;
      } else if (data.is_scanning) {
        document.getElementById('scan-subtitle').textContent = '正在收集影片列表，请稍候...';
      }

      // 当前电影名
      if (movieName) {
        document.getElementById('current-movie').innerHTML =
          '<span class="spinner-small"></span>' + movieName;
      }
    }

    function showError(msg) {
      clearInterval(pollTimer);
      document.getElementById('scan-title').textContent = '扫描失败';
      document.getElementById('scan-subtitle').textContent = '';
      document.getElementById('current-movie').textContent = '';
      const errBox = document.getElementById('error-box');
      errBox.style.display = '';
      errBox.innerHTML = '❌ ' + msg +
        '<br><button class="btn btn-primary" onclick="location.reload()" style="margin-top:0.75rem">重试</button>';
    }

    function poll() {
      fetch('/api/scan_progress')
        .then(r => r.json())
        .then(data => {
          if (data.error) { showError(data.error); return; }
          updateProgress(data);
        })
        .catch(() => { /* 网络抖动静默忽略 */ });
    }

    window.onload = function () {
      // 开始轮询进度（每 400ms 一次）
      poll();
      pollTimer = setInterval(poll, 400);

      // 阻塞式内容请求：扫描完成后后端才返回，直接替换页面
      fetch('/_index_content')
        .then(r => { if (!r.ok) throw new Error('网络请求失败'); return r.text(); })
        .then(html => {
          clearInterval(pollTimer);
          document.open(); document.write(html); document.close();
        })
        .catch(err => showError(err.message));
    };
  </script>
</body>

</html>
