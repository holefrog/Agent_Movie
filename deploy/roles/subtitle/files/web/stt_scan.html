<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4: 媒体语言鉴定 - Agent Movie</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .progress-container {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .progress-bar-wrapper {
            background-color: var(--border-color);
            border-radius: var(--radius-sm);
            height: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn-danger {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background-color: #dc2626; }

        .results-container {
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            background-color: var(--bg-color);
        }
        
        .lang-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 0.5rem;
            margin-bottom: 0.25rem;
            background-color: #f1f5f9;
            color: #475569;
        }
        
        .lang-badge.zh {
            background-color: #dcfce7;
            color: #166534;
        }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <h1>Stage 4: 媒体语言鉴定监控中心</h1>
            </div>
        </div>
    </header>

    <main class="main-content">
        <a href="/" class="nav-link">&larr; 返回字幕补全页</a>
        
        <div class="progress-container">
            <div class="progress-header">
                <h2>媒体语言鉴定（音轨 + 内置字幕）</h2>
                <div id="statusBadge" class="lang-badge">空闲中</div>
            </div>
            
            <div class="progress-bar-wrapper">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            
            <div class="status-text">
                <span id="progressText">总进度: 0 / 0</span>
                <span id="currentMovie" style="margin-left: 2rem; font-weight: 500; color: var(--primary-color);"></span>
            </div>
            
            <div id="errorAlert" style="display: none; margin-top: 1rem; padding: 1rem; background-color: #fef2f2; border: 1px solid #f87171; border-radius: 0.5rem; color: #b91c1c;">
                <strong>🚨 严重错误导致中止：</strong>
                <span id="errorMsg"></span>
            </div>
            
            <div class="controls">
                <button id="btnStart" class="btn-primary" onclick="startScan()">开始全库体检</button>
                <button id="btnStop" class="btn-danger" onclick="stopScan()" style="display: none;">中止任务</button>
            </div>
        </div>

        <div class="results-container">
            <h2>已处理结果</h2>
            <table>
                <thead>
                    <tr>
                        <th>电影名称</th>
                        <th>音轨分析结果</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    <!-- Results will be populated here -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let pollInterval = null;
        let processedHistory = [];
        let initialLibraryCount = 0;

        function renderTable(movies) {
            const tbody = document.getElementById('resultsTable');
            tbody.innerHTML = '';
            movies.forEach(movie => {
                const tr = document.createElement('tr');
                
                const tdTitle = document.createElement('td');
                tdTitle.textContent = movie.title;
                tr.appendChild(tdTitle);
                
                const tdTracks = document.createElement('td');
                movie.tracks.forEach(track => {
                    const span = document.createElement('span');
                    span.className = 'lang-badge ' + (track.lang === 'zh' ? 'zh' : '');
                    span.textContent = `Track ${track.index}: ${track.lang.toUpperCase()}`;
                    tdTracks.appendChild(span);
                });
                if (movie.tracks.length === 0) {
                    tdTracks.textContent = '无有效音轨';
                }
                tr.appendChild(tdTracks);
                
                tbody.appendChild(tr);
            });
        }

        function updateUI(status) {
            const isRunning = status.is_running;
            
            document.getElementById('btnStart').style.display = isRunning ? 'none' : 'block';
            document.getElementById('btnStop').style.display = isRunning ? 'block' : 'none';
            
            const badge = document.getElementById('statusBadge');
            if (isRunning) {
                badge.textContent = status.should_stop ? '正在停止...' : '正在处理';
                badge.style.backgroundColor = '#dbeafe';
                badge.style.color = '#1e40af';
            } else {
                badge.textContent = '空闲中';
                badge.style.backgroundColor = '#f1f5f9';
                badge.style.color = '#475569';
            }

            let totalLibrary = status.total_library_count || initialLibraryCount;
            let alreadyProcessed = status.already_processed_count || processedHistory.length;
            let currentSession = status.processed_count || 0;
            
            // 如果尚未点击开始跑批，并且后台也不在运行，则不包括当前 session
            if (!isRunning && status.total_library_count === undefined) {
                currentSession = 0;
            }
            
            const totalProcessed = alreadyProcessed + currentSession;
            const percent = totalLibrary > 0 ? (totalProcessed / totalLibrary) * 100 : 0;
            
            document.getElementById('progressBar').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = `总进度: ${totalProcessed} / ${totalLibrary}`;
            
            if (status.current_movie && isRunning) {
                document.getElementById('currentMovie').textContent = `正在分析: ${status.current_movie}`;
            } else {
                document.getElementById('currentMovie').textContent = '';
            }

            if (status.error) {
                document.getElementById('errorAlert').style.display = 'block';
                document.getElementById('errorMsg').textContent = status.error;
            } else {
                document.getElementById('errorAlert').style.display = 'none';
            }

            // Merge history with current session
            const sessionTitles = new Set(status.processed_movies.map(m => m.title));
            const filteredHistory = processedHistory.filter(m => !sessionTitles.has(m.title));
            const allMovies = [...status.processed_movies, ...filteredHistory];
            
            renderTable(allMovies);
            
            if (isRunning && !pollInterval) {
                pollInterval = setInterval(fetchStatus, 2000);
            } else if (!isRunning && pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/stt_status');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error("Failed to fetch status:", err);
            }
        }

        async function startScan() {
            try {
                const res = await fetch('/api/stt_start', { method: 'POST' });
                if (res.ok) {
                    fetchStatus();
                } else {
                    const data = await res.json();
                    alert(data.error || "启动失败");
                }
            } catch (err) {
                alert("请求失败: " + err);
            }
        }

        async function stopScan() {
            try {
                await fetch('/api/stt_stop', { method: 'POST' });
                fetchStatus();
            } catch (err) {
                alert("请求失败: " + err);
            }
        }

        async function initPage() {
            try {
                const res = await fetch('/api/stt_history');
                const data = await res.json();
                processedHistory = data.history || [];
                initialLibraryCount = data.total_library_count || 0;
                renderTable(processedHistory);
            } catch (err) {
                console.error("Failed to fetch history:", err);
            }
            fetchStatus();
        }

        // Initial fetch
        initPage();
    </script>
</body>
</html>
