<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Movie - 中文字幕获取</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🎬 中文字幕获取</h1>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <!-- 5阶段架构状态显示 -->
    <div id="stageContainer">
      <div class="stage-card" id="stage1Card">
        <h3>Stage 1: 媒体库扫描</h3>
        <p id="stage1Status">扫描中...</p>
        <div id="stage1Progress" style="display:none; margin-top:1rem;">
          <div class="loading-progress-bar-bg">
            <div class="progress-bar-fill" id="stage1ProgressBar" style="width:0%"></div>
          </div>
          <p id="stage1ProgressText" style="margin-top:0.5rem; font-size:0.9rem; color:#64748b;"></p>
        </div>
      </div>
      <div class="stage-card" id="stage2Card">
        <h3>Stage 2: 字幕评估</h3>
        <p id="stage2Status">等待中...</p>
        <div id="stage2Progress" style="display:none; margin-top:1rem;">
          <div class="loading-progress-bar-bg">
            <div class="progress-bar-fill" id="stage2ProgressBar" style="width:0%; background:#8b5cf6;"></div>
          </div>
          <p id="stage2ProgressText" style="margin-top:0.5rem; font-size:0.9rem; color:#64748b;"></p>
        </div>
      </div>
      <div class="stage-card" id="stage3Card">
        <h3>Stage 3: 字幕清洗</h3>
        <p id="stage3Status">等待中...</p>
        <button id="btnStage3" class="btn btn-primary" onclick="triggerStage3()" style="display:none;">🧹 清洗字幕</button>
      </div>
      <div class="stage-card" id="stage4Card">
        <h3>Stage 4: 音轨识别</h3>
        <p id="stage4Status">等待中...</p>
        <button id="btnStage4Start" class="btn btn-primary" onclick="triggerStage4()" style="display:none;">🎵 开始识别音轨</button>
        <button id="btnStage4Stop" class="btn btn-danger" onclick="stopStage4()" style="display:none;">⏹ 中止</button>
        <div id="stage4Progress" style="display:none; margin-top:1rem;">
          <div class="progress-bar-bg">
            <div class="progress-bar" id="stage4ProgressBar" style="width:0%"></div>
          </div>
          <p id="stage4ProgressText" style="margin-top:0.5rem; font-size:0.9rem;"></p>
        </div>
      </div>
      <div class="stage-card" id="stage5Card">
        <h3>Stage 5: 字幕补全</h3>
        <p id="stage5Status">等待中...</p>
        <button id="btnStage5" class="btn btn-primary" onclick="triggerStage5()" style="display:none;">📥 开始补全字幕</button>
      </div>

      <div id="messageBox" style="margin-top: 1.5rem; padding: 1rem; border-radius: var(--radius-sm); display:none;"></div>
    </div>

    <!-- 影片列表（Stage 5完成后显示） -->
    <div id="moviesContainer" style="display:none; margin-top: 2rem;">
      <p class="subtitle-count">共 <span id="moviesCount">0</span> 部影片需要中文字幕</p>

      <div class="toolbar">
        <label><input type="checkbox" id="selectAll" onchange="toggleAll()"> 全选可用</label>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:40px;"></th>
            <th>标题</th>
            <th>年份</th>
            <th>语言</th>
            <th>中文字幕</th>
            <th>英文字幕</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="moviesTable">
          <!-- Movies will be populated here -->
        </tbody>
      </table>

      <div class="actions">
        <button id="submitBtn" class="btn btn-primary" onclick="submitSelected()" disabled>下载字幕 (首选中文，次选英文)</button>
        <button class="btn btn-secondary" onclick="cancelAll()">取消</button>
        <span class="selected-count" id="selectedCount">已选 0 部</span>
      </div>

      <div id="progress">
        <p class="progress-text" id="progressText">准备中...</p>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <div id="results"></div>
      </div>
    </div>
  </div>

  <script>
    let pollInterval = null;
    let movies = [];

    // 页面加载完成后开始轮询并触发扫描
    window.onload = function() {
      startScan();
      startPolling();
    };

    async function startScan() {
      try {
        await fetch('/api/start_scan', { method: 'POST' });
      } catch (err) {
        console.error("Failed to start scan:", err);
      }
    }

    function startPolling() {
      fetchPageStatus();
      pollInterval = setInterval(fetchPageStatus, 2000);
    }

    async function fetchPageStatus() {
      try {
        const res = await fetch('/api/page_status');
        const data = await res.json();
        updateUI(data);
      } catch (err) {
        console.error("Failed to fetch page status:", err);
      }
    }

    function updateUI(data) {
      const { current_stage, is_blocking, message, stats } = data;

      // 更新各Stage卡片样式
      for (let i = 1; i <= 5; i++) {
        const card = document.getElementById(`stage${i}Card`);
        const status = document.getElementById(`stage${i}Status`);
        
        card.classList.remove('active', 'completed', 'blocking');
        
        if (i < current_stage) {
          card.classList.add('completed');
          status.textContent = '✅ 已完成';
        } else if (i === current_stage) {
          card.classList.add(is_blocking ? 'blocking' : 'active');
          status.textContent = is_blocking ? '⚠️ 需要处理' : '⏳ 进行中';
        } else {
          status.textContent = '⏸ 等待中';
        }
      }

      // 处理 Stage 1 & 2 扫描进度
      const stage1Progress = document.getElementById('stage1Progress');
      const stage2Progress = document.getElementById('stage2Progress');
      if (current_stage === 1) {
        stage1Progress.style.display = 'block';
        stage2Progress.style.display = 'block';
        fetchScanProgress();
      } else {
        stage1Progress.style.display = 'none';
        stage2Progress.style.display = 'none';
      }

      // 更新消息框
      const messageBox = document.getElementById('messageBox');
      if (message) {
        messageBox.style.display = 'block';
        messageBox.textContent = message;
        if (is_blocking) {
          messageBox.style.backgroundColor = '#fffbeb';
          messageBox.style.border = '1px solid #fbbf24';
          messageBox.style.color = '#92400e';
        } else {
          messageBox.style.backgroundColor = '#f0f9ff';
          messageBox.style.border = '1px solid #bae6fd';
          messageBox.style.color = '#0369a1';
        }
      } else {
        messageBox.style.display = 'none';
      }

      // 显示/隐藏操作按钮
      document.getElementById('btnStage3').style.display = (current_stage === 3 && is_blocking) ? 'inline-block' : 'none';
      
      // Stage 4 按钮和进度
      const btnStage4Start = document.getElementById('btnStage4Start');
      const btnStage4Stop = document.getElementById('btnStage4Stop');
      const stage4Progress = document.getElementById('stage4Progress');
      
      if (current_stage === 4) {
        if (stats.not_identified > 0) {
          btnStage4Start.style.display = 'inline-block';
        }
        stage4Progress.style.display = 'block';
        // 获取Stage 4进度
        fetchStage4Progress();
      } else {
        btnStage4Start.style.display = 'none';
        btnStage4Stop.style.display = 'none';
        stage4Progress.style.display = 'none';
      }

      // Stage 5 按钮
      document.getElementById('btnStage5').style.display = (current_stage === 5 && stats.need_subtitle > 0) ? 'inline-block' : 'none';

      // 如果Stage 5完成，显示影片列表
      if (current_stage === 5 && stats.need_subtitle === 0 && stats.stage5_error === 0) {
        if (movies.length === 0) {
          loadMovies();
        }
        document.getElementById('moviesContainer').style.display = 'block';
      }
    }

    async function fetchStage4Progress() {
      try {
        const res = await fetch('/api/stt_status');
        const data = await res.json();
        
        const btnStage4Start = document.getElementById('btnStage4Start');
        const btnStage4Stop = document.getElementById('btnStage4Stop');
        const progressBar = document.getElementById('stage4ProgressBar');
        const progressText = document.getElementById('stage4ProgressText');
        
        if (data.is_running) {
          btnStage4Start.style.display = 'none';
          btnStage4Stop.style.display = 'inline-block';
          
          const total = data.total_library_count || data.total_movies || 1;
          const processed = data.processed_count + (data.already_processed_count || 0);
          const percent = (processed / total) * 100;
          
          progressBar.style.width = `${percent}%`;
          progressText.textContent = `进度: ${processed} / ${total} ${data.current_movie ? `(${data.current_movie})` : ''}`;
        } else {
          btnStage4Start.style.display = 'inline-block';
          btnStage4Stop.style.display = 'none';
          progressBar.style.width = '100%';
          progressText.textContent = '已完成';
        }
      } catch (err) {
        console.error("Failed to fetch stage 4 progress:", err);
      }
    }

    async function fetchScanProgress() {
      try {
        const res = await fetch('/api/scan_progress');
        const data = await res.json();

        const p1Bar = document.getElementById('stage1ProgressBar');
        const p1Text = document.getElementById('stage1ProgressText');
        const p2Bar = document.getElementById('stage2ProgressBar');
        const p2Text = document.getElementById('stage2ProgressText');

        if (data.is_scanning) {
          const current = data.current || 0;
          const total = data.total || 1;
          const percent = Math.min((current / total) * 100, 100).toFixed(1);
          
          p1Bar.style.width = `${percent}%`;
          p1Text.textContent = `正在扫描: ${data.current_movie} (${current}/${total})`;
          
          // Stage 2 is technically happening together with Stage 1 in scanner
          p2Bar.style.width = `${percent}%`;
          p2Text.textContent = `正在评估字幕状态...`;
        } else {
          p1Bar.style.width = '100%';
          p1Text.textContent = '扫描完成';
          p2Bar.style.width = '100%';
          p2Text.textContent = '评估完成';
        }
      } catch (err) {
        console.error("Failed to fetch scan progress:", err);
      }
    }

    async function triggerStage3() {
      const btn = document.getElementById('btnStage3');
      btn.disabled = true;
      btn.textContent = '清洗中...';
      
      try {
        const res = await fetch('/api/stage3_cleanup', { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          alert(data.message);
        } else {
          alert('错误: ' + data.error);
        }
      } catch (err) {
        alert('请求失败: ' + err);
      } finally {
        btn.disabled = false;
        btn.textContent = '🧹 清洗字幕';
      }
    }

    async function triggerStage4() {
      try {
        const res = await fetch('/api/stage4_stt', { method: 'POST' });
        const data = await res.json();
        if (!data.success) {
          alert('错误: ' + (data.error || '启动失败'));
        }
      } catch (err) {
        alert('请求失败: ' + err);
      }
    }

    async function stopStage4() {
      try {
        await fetch('/api/stt_stop', { method: 'POST' });
      } catch (err) {
        alert('请求失败: ' + err);
      }
    }

    async function triggerStage5() {
      if (movies.length === 0) {
        await loadMovies();
      }
      
      // 自动选择所有需要字幕的影片
      const checkboxes = document.querySelectorAll('.movie-cb:not(:disabled)');
      checkboxes.forEach(cb => cb.checked = true);
      updateCount();
      
      await submitSelected();
    }

    async function loadMovies() {
      try {
        const res = await fetch('/_index_content');
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // 提取影片数据
        const rows = doc.querySelectorAll('tbody tr');
        movies = [];
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length >= 7) {
            const checkbox = cells[0].querySelector('input');
            if (checkbox && !checkbox.disabled) {
              movies.push({
                directory: checkbox.value,
                title: cells[1].textContent.trim(),
                year: cells[2].textContent.trim(),
                languages: cells[3].textContent.trim(),
                has_chinese_sub: cells[4].textContent.includes('有'),
                has_english_sub: cells[5].textContent.includes('有'),
                is_chinese_audio: cells[6].textContent.includes('中文语音')
              });
            }
          }
        });
        
        renderMovies();
      } catch (err) {
        console.error("Failed to load movies:", err);
      }
    }

    function renderMovies() {
      const tbody = document.getElementById('moviesTable');
      tbody.innerHTML = '';
      document.getElementById('moviesCount').textContent = movies.length;
      
      movies.forEach(m => {
        const tr = document.createElement('tr');
        tr.className = m.is_chinese_audio ? 'disabled' : '';
        tr.innerHTML = `
          <td>
            <input type="checkbox"
                   class="movie-cb"
                   value="${m.directory}"
                   ${m.is_chinese_audio ? 'disabled' : ''}>
          </td>
          <td class="title-cell">${m.title}</td>
          <td>${m.year}</td>
          <td><span class="tag tag-lang">${m.languages || '未知'}</span></td>
          <td>
            ${m.has_chinese_sub ? '<span class="tag tag-zh-cn">有</span>' : '<span class="tag tag-none">无</span>'}
          </td>
          <td>
            ${m.has_english_sub ? '<span class="tag tag-en">有</span>' : '<span class="tag tag-none">无</span>'}
          </td>
          <td>
            ${m.is_chinese_audio ? '<span class="tag tag-cn-audio">中文语音</span>' : ''}
          </td>
        `;
        tbody.appendChild(tr);
      });
      
      // 绑定事件
      document.querySelectorAll('.movie-cb').forEach(cb => {
        cb.addEventListener('change', updateCount);
      });
    }

    function updateCount() {
      const checked = document.querySelectorAll('.movie-cb:checked:not(:disabled)');
      const countEl = document.getElementById('selectedCount');
      const submitBtn = document.getElementById('submitBtn');
      countEl.textContent = `已选 ${checked.length} 部`;
      submitBtn.disabled = checked.length === 0;
    }

    function toggleAll() {
      const selectAll = document.getElementById('selectAll').checked;
      document.querySelectorAll('.movie-cb:not(:disabled)').forEach(cb => {
        cb.checked = selectAll;
      });
      updateCount();
    }

    function cancelAll() {
      document.querySelectorAll('.movie-cb').forEach(cb => {
        cb.checked = false;
      });
      document.getElementById('selectAll').checked = false;
      updateCount();
    }

    async function submitSelected() {
      const checked = document.querySelectorAll('.movie-cb:checked:not(:disabled)');
      const selected = Array.from(checked).map(cb => cb.value);

      if (selected.length === 0) return;

      document.getElementById('submitBtn').disabled = true;
      document.querySelectorAll('.movie-cb').forEach(cb => cb.disabled = true);

      const progressDiv = document.getElementById('progress');
      const progressText = document.getElementById('progressText');
      const progressBar = document.getElementById('progressBar');
      const resultsDiv = document.getElementById('results');

      progressDiv.style.display = 'block';
      progressText.textContent = `正在处理 ${selected.length} 部影片...`;
      progressBar.style.width = '10%';
      resultsDiv.innerHTML = '';

      try {
        const response = await fetch('/api/stage5_complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selected }),
        });

        const data = await response.json();

        if (data.error) {
          progressText.textContent = `错误: ${data.error}`;
          progressBar.style.width = '100%';
          progressBar.style.background = '#fc8181';
          return;
        }

        progressBar.style.width = '100%';
        let okCount = 0;
        let failCount = 0;

        data.results.forEach(r => {
          const div = document.createElement('div');
          div.className = 'result-item';
          if (r.success) {
            okCount++;
            const methodText = r.method === 'download_zh' ? '下载中文' : (r.method === 'download_en' ? '下载英文' : (r.method === 'translated' ? '翻译' : '未知'));
            div.innerHTML = `<span class="result-ok">✅ ${r.title} (${r.year}) - ${methodText}成功</span>`;
          } else {
            failCount++;
            div.innerHTML = `<span class="result-fail">❌ ${r.title} (${r.year}) - 失败: ${r.error}</span>`;
          }
          resultsDiv.appendChild(div);
        });

        progressText.textContent = `处理完成：${okCount} 成功，${failCount} 失败`;

      } catch (err) {
        progressText.textContent = `请求失败: ${err.message}`;
        progressBar.style.background = '#fc8181';
      }
    }
  </script>
</body>
</html>
